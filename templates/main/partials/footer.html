{% load static %}
<!-- FOOTER -->
<footer class="bg-[var(--club-taupe)] text-gray-200 pt-16 pb-8 font-['Inter']">
  <div
    class="max-w-7xl mx-auto px-6 lg:px-8 grid grid-cols-1 md:grid-cols-3 gap-12"
  >
    <!-- Logo + Tagline -->
    <div>
      <!-- Logo and text in one row -->
      <div class="flex items-center gap-3 mb-4">
        <img
          src="{% static 'images/logo_ppl.jpg' %}"
          alt="The Pet People Logo"
          class="h-10 w-10 md:h-12 md:w-12 object-contain"
        />
        <h3
          class="text-3xl font-bold text-[var(--club-olive)] font-['Cormorant_Garamond']"
        >
          ThePetPeople
        </h3>
      </div>
    </div>

    <!-- Quick Links -->
    <div>
      <h4
        class="text-lg font-semibold text-white mb-4 font-['Cormorant_Garamond']"
      >
        Quick Links
      </h4>
      <ul class="space-y-3">
        <li>
          <a href="#hero" class="hover:text-[var(--club-rust)] transition"
            >Home</a
          >
        </li>
        <li>
          <a href="#services" class="hover:text-[var(--club-rust)] transition"
            >Services</a
          >
        </li>
        <li>
          <a href="#events" class="hover:text-[var(--club-rust)] transition"
            >Events</a
          >
        </li>
        <li>
          <a href="#contact" class="hover:text-[var(--club-rust)] transition"
            >Contact</a
          >
        </li>
      </ul>
    </div>

    <!-- Contact Info -->
    <div>
      <h4
        class="text-lg font-semibold text-white mb-4 font-['Cormorant_Garamond']"
      >
        Contact
      </h4>
      <ul class="space-y-3 text-white">
        <li class="flex items-center">
          <i class="fa-solid fa-location-dot text-white w-6"></i>
          <span class="ml-2">Redhill, Off Dharamshi Road, Limuru</span>
        </li>
        <li class="flex items-center">
          <i class="fa-solid fa-phone text-white w-6"></i>
          <span class="ml-2">+254 798 503 335</span>
        </li>
        <li class="flex items-center">
          <i class="fa-solid fa-envelope text-white w-6"></i>
          <span class="ml-2">thepetpplke@gmail.com</span>
        </li>
      </ul>

      <!-- Social Icons -->
      <div class="flex space-x-4 mt-6">
        <a
          href="https://www.instagram.com/thepetpeopleke?igsh=MW00NGpnbGhrN2R0NQ%3D%3D&utm_source=qr"
          target="_blank"
          rel="noopener noreferrer"
          class="text-[var(--club-dark-brown)] hover:text-[var(--club-rust)] text-2xl transition"
        >
          <i class="bx bxl-instagram"></i>
        </a>
        <a
          href="https://www.tiktok.com/@thepetpeopleke?_r=1&_t=ZS-95tZgCDjmYm"
          target="_blank"
          rel="noopener noreferrer"
          class="text-[var(--club-dark-brown)] hover:text-[var(--club-rust)] text-2xl transition"
        >
          <i class="bx bxl-tiktok"></i>
        </a>
      </div>
    </div>
  </div>

  <!-- Divider -->
  <div
    class="border-t border-[var(--club-olive)] mt-12 pt-6 text-center text-[var(--club-olive)] text-sm"
  >
    © <span id="year"></span> ThePetPeople. All rights reserved. |
    <a
      href="/terms"
      class="hover:underline hover:text-[var(--club-gold)] transition"
      >Terms & Conditions</a
    >
    |
    <a
      href="/privacy"
      class="hover:underline hover:text-[var(--club-gold)] transition"
      >Privacy Policy</a
    >
  </div>
</footer>
